<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles.css">

</head>
<body>
    <div class="happy-valentines">
        <div class="hearts">
            <div class="one"></div>
            <div class="two"></div>
            <div class="three"></div>
            <div class="four"></div>
            <div class="five"></div>
            <div class="six"></div>
          </div>
        <!-- <img src="./assets/logo.PNG" alt="Logo" class="logo"/> -->
        <div class="title">
            <svg width="1200" height="380">
                <path id="curve" d="M 20 480 C 0 480, 520 0, 1200 480"></path>  
                <text class="title" text-anchor="middle">
                    <textPath class="text__path" href="#curve" startOffset="50%">
                        Valentine++
                    </textPath>
                </text>
            </svg>
        </div>
        <div class="enter">
            <div class="text">If you're here you must have received a gift from a special someone...</div>
            <form id="codeForm" class="enter" action="https://valentinesplusplus-eb4adca6efcd.herokuapp.com/vc_card/" method="GET">
                <input name="code" type="text" placeholder="Enter your code here!!" class="custom-input" id="inputCode"/>
                <button type="submit" id="submit">Submit!</button>

            </form>            
        </div>
    </div>
    <script>
        const form = document.querySelector("form");

        const handleSubmit = async (e) => {
        e.preventDefault();

        try {
            const inputValue = document.getElementById("inputCode").value;
            const response = await fetch(
            `http://localhost:8000/vc_card/${encodeURIComponent(
                inputValue
            )}`,
            {
                method: "GET",
                headers: {
                "Content-Type": "application/json",
                },
            }
            );
            // console.log("response is ", response)
            if (response.ok) {
                const randomNumber = Math.floor(Math.random() * 4) + 1;
                const data = await response.json();
                console.log(data)
                localStorage.setItem('pageData', JSON.stringify(data));
                window.location.href = `/vc_card${randomNumber}`
            
            } else {
            console.error("Server returned an error:", response.statusText);
            }
        } catch (error) {
            console.error("Error fetching data:", error);
        }
        };

        form.addEventListener("submit", handleSubmit);
        form.addEventListener("keyup", (e) => {
        if (e.key === "Enter") {
            handleSubmit(e);
        }
        });

    </script>
    
</body>
</html>
